name: AscendFi CI

# Run on every push and pull request to master
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 — Python agent
  # Runs on a fresh Ubuntu VM, installs all Python dependencies, and verifies
  # the FastAPI app can be imported without errors.
  # ─────────────────────────────────────────────────────────────────────────────
  python-agent:
    name: Python Agent — Install & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Hackathon/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        working-directory: Hackathon
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify FastAPI app imports without errors
        working-directory: Hackathon
        env:
          # Provide placeholder keys so the app can be imported
          # (no real keys are stored — secrets are injected by GitHub)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'dummy-key-for-ci' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy-key-for-ci' }}
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          # Verify all agent modules import cleanly
          from app.main import app
          from agents.supervisor import SupervisorAgent
          from tools.financial_calculators import *
          print('✓ All Python modules imported successfully')
          print(f'✓ FastAPI app title: {app.title}')
          "

      - name: Check FastAPI routes are registered
        working-directory: Hackathon
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'dummy-key-for-ci' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy-key-for-ci' }}
        run: |
          python -c "
          from app.main import app
          routes = [r.path for r in app.routes]
          required = ['/health', '/chat/stream', '/api/dashboard']
          for r in required:
              assert r in routes, f'Missing route: {r}'
          print('✓ Required API routes verified:', required)
          "

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 — Node.js backend
  # Installs deps and compiles TypeScript on a fresh Ubuntu VM.
  # ─────────────────────────────────────────────────────────────────────────────
  node-backend:
    name: Node.js Backend — Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build TypeScript
        working-directory: backend
        run: npm run build

      - name: Verify build output exists
        run: |
          test -f backend/dist/index.js && echo "✓ backend/dist/index.js exists" || exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3 — Nuxt frontend
  # Installs deps and runs a production build on a fresh Ubuntu VM.
  # ─────────────────────────────────────────────────────────────────────────────
  nuxt-frontend:
    name: Nuxt Frontend — Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create frontend .env for build
        working-directory: frontend
        run: |
          cat > .env << 'EOF'
          NUXT_PUBLIC_USE_DUMMY_DATA=true
          NUXT_PUBLIC_API_BASE=http://localhost:8000/api
          NUXT_PUBLIC_AGENT_BASE=http://localhost:3001
          EOF

      - name: Build Nuxt app
        working-directory: frontend
        run: npm run build

      - name: Verify build output exists
        run: |
          test -d frontend/.output && echo "✓ frontend/.output exists" || exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4 — React Native / Expo mobile app
  # Installs deps and runs expo-doctor + TypeScript check on a fresh Ubuntu VM.
  # (A full native build requires macOS + Xcode/Android SDK; this validates
  #  that all JS/TS code and dependencies are correct.)
  # ─────────────────────────────────────────────────────────────────────────────
  mobile:
    name: Mobile App — Install & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Create mobile .env for CI
        working-directory: mobile
        run: |
          cat > .env << 'EOF'
          EXPO_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key
          EOF

      - name: TypeScript type-check
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Verify Expo config is valid
        working-directory: mobile
        run: npx expo config --type introspect > /dev/null && echo "✓ Expo config valid"
